<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Countdown</title>

<style>

html, body {
  margin:0;
  padding:0;
  width:252px;
  height:468px;
  background:#0B2341;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
}

#container{
  width:252px;
  height:468px;
  text-align:center;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  align-items:center;
  font-family:Arial, Helvetica, sans-serif;
  color:#57ccf6;
}

#title{
  font-family:Georgia, serif;
  font-size:18px;
  margin-top:20px;
  margin-bottom:30px;
  letter-spacing:1px;
}

.number{
  font-size:48px;
  font-weight:bold;
}

.label{
  font-size:14px;
  letter-spacing:2px;
  margin-bottom:18px;
}

</style>

</head>

<body>

<div id="container">

<div id="title">COUNTDOWN TO KICKOFF</div>

<div>
<div class="number" id="days"></div>
<div class="label">DAYS</div>
</div>

<div>
<div class="number" id="hours"></div>
<div class="label">HOURS</div>
</div>

<div>
<div class="number" id="minutes"></div>
<div class="label">MINUTES</div>
</div>

<div>
<div class="number" id="seconds"></div>
<div class="label">SECONDS</div>
</div>

</div>

<script>

const targetDate = new Date("September 1, 2026 19:30:00").getTime(); // CHANGE DATE

function updateCountdown(){

const now = new Date().getTime();
const diff = targetDate - now;

const days = Math.floor(diff/(1000*60*60*24));
const hours = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
const minutes = Math.floor((diff%(1000*60*60))/(1000*60));
const seconds = Math.floor((diff%(1000*60))/1000);

document.getElementById("days").innerHTML = days;
document.getElementById("hours").innerHTML = hours;
document.getElementById("minutes").innerHTML = minutes;
document.getElementById("seconds").innerHTML = seconds;

}

setInterval(updateCountdown,1000);
updateCountdown();

</script>

</body>
</html>
